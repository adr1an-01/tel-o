<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Central"/>
  <meta name="theme-color" content="#080a10"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>Central de Controle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <span class="login-logo-icon">✦</span>
      <span>Central de Controle</span>
    </div>
    <p class="login-sub">Acesso restrito à equipe</p>
    <div class="login-form">
      <label>Usuário<input type="text" id="loginUser" placeholder="admin" autocomplete="username"/></label>
      <label>Senha<input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/></label>
      <div class="login-error" id="loginError"></div>
      <button class="btn btn--primary btn--full" onclick="fazerLogin()">Entrar</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="layout" id="appLayout" style="display:none">
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Central</span>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-tab="dashboard">
        <span class="nav-icon">⚡</span><span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-item" data-tab="calendario">
        <span class="nav-icon">📅</span><span class="nav-label">Calendário</span>
      </button>
      <button class="nav-item" data-tab="escalas">
        <span class="nav-icon">🎛️</span><span class="nav-label">Escalas</span>
      </button>
      <button class="nav-item" data-tab="servos">
        <span class="nav-icon">👥</span><span class="nav-label">Servos</span>
      </button>
      <button class="nav-item" data-tab="biblia">
        <span class="nav-icon">📖</span><span class="nav-label">Bíblia</span>
      </button>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user" id="sidebarUser"></div>
      <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>
  </aside>

  <main class="main">

    <!-- DASHBOARD -->
    <section class="tab-panel active" id="tab-dashboard">
      <div class="panel-header"><h1>Dashboard</h1></div>
      <div class="dash-cards" id="dashCards"></div>
      <div class="dash-bottom">
        <div>
          <h2 class="section-title">Próximas Escalas</h2>
          <div id="dashProximas"></div>
        </div>
        <div>
          <h2 class="section-title">Aniversariantes</h2>
          <div id="dashAniversarios"></div>
        </div>
      </div>
    </section>

    <!-- CALENDÁRIO -->
    <section class="tab-panel" id="tab-calendario">
      <div class="panel-header">
        <div class="cal-nav">
          <button class="btn-cal-nav" id="calPrev">‹</button>
          <h1 id="calTitulo"></h1>
          <button class="btn-cal-nav" id="calNext">›</button>
        </div>
        <button class="btn btn--primary" onclick="abrirModal('modal-escala')">+ Nova Escala</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="day-detail" id="dayDetail" style="display:none">
        <div class="day-detail-header">
          <span id="dayDetailTitle"></span>
          <button onclick="fecharDetalhe()">✕</button>
        </div>
        <div id="dayDetailBody"></div>
      </div>
    </section>

    <!-- ESCALAS -->
    <section class="tab-panel" id="tab-escalas">
      <div class="panel-header">
        <h1>Escalas</h1>
        <button class="btn btn--primary" onclick="abrirModal('modal-escala')">+ Nova Escala</button>
      </div>
      <div class="card-grid" id="lista-escalas"></div>
    </section>

    <!-- SERVOS -->
    <section class="tab-panel" id="tab-servos">
      <div class="panel-header">
        <h1>Servos</h1>
        <button class="btn btn--primary" onclick="abrirModal('modal-servo')">+ Novo Servo</button>
      </div>
      <div class="servos-filtros">
        <input type="text" id="buscarServo" placeholder="Buscar servo…" oninput="filtrarServos()"/>
      </div>
      <div class="card-grid" id="lista-servos"></div>
    </section>

    <!-- BÍBLIA -->
    <section class="tab-panel" id="tab-biblia">
      <!-- Nível 1: Livros -->
      <div id="nivel-livros">
        <div class="panel-header"><h1>Bíblia — NVI</h1></div>
        <div class="bible-tabs">
          <button class="bible-tab active" data-btab="livros">📖 Livros</button>
          <button class="bible-tab" data-btab="busca">🔍 Busca</button>
          <button class="bible-tab" data-btab="favoritos">⭐ Favoritos</button>
          <button class="bible-tab" data-btab="estudos">📝 Estudos</button>
        </div>
        <div class="bible-panel active" id="btab-livros">
          <div class="testament-label">Antigo Testamento</div>
          <div class="books-grid" id="booksAT"></div>
          <div class="testament-label" style="margin-top:20px">Novo Testamento</div>
          <div class="books-grid" id="booksNT"></div>
        </div>
        <div class="bible-panel" id="btab-busca">
          <div class="bible-search-box">
            <div class="bible-search-row">
              <input type="text" id="bibliaRef" placeholder="Ex: João 3:16 ou João 3:1-10"/>
              <button class="btn btn--primary" onclick="buscarPorReferencia()">Buscar</button>
            </div>
            <div class="bible-search-row">
              <input type="text" id="bibliaPalavra" placeholder="Buscar por palavra-chave…"/>
              <button class="btn btn--ghost" onclick="buscarPorPalavra()">Buscar</button>
            </div>
          </div>
          <div id="bibliaResultado"></div>
        </div>
        <div class="bible-panel" id="btab-favoritos">
          <div class="bible-fav-header">
            <select id="favCategoria" onchange="carregarFavoritos()"><option value="todas">Todas as categorias</option></select>
          </div>
          <div id="listaFavoritos"></div>
        </div>
        <div class="bible-panel" id="btab-estudos">
          <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
            <button class="btn btn--primary" onclick="abrirModal('modal-estudo')">+ Novo Estudo</button>
          </div>
          <div id="listaEstudos"></div>
        </div>
      </div>

      <!-- Nível 2: Capítulos -->
      <div id="nivel-capitulos" style="display:none">
        <div class="bible-nav-header">
          <button class="bible-back-btn" onclick="voltarLivros()">‹ Livros</button>
          <span id="livroAtualTitulo"></span>
          <span></span>
        </div>
        <div class="bible-cap-nota" id="capNotaArea">
          <div class="bible-cap-nota-toggle" onclick="toggleNotaCapitulo()">
            📓 Nota do livro <span id="capNotaToggleIcon">▼</span>
          </div>
          <div id="capNotaForm" style="display:none">
            <textarea id="capNotaTexto" rows="3" placeholder="Anotação geral deste livro…"></textarea>
            <button class="btn btn--primary" style="margin-top:8px;width:100%" onclick="salvarNotaCapituloAtual()">Salvar nota</button>
          </div>
        </div>
        <div class="chapters-grid" id="chaptersGrid"></div>
      </div>

      <!-- Nível 3: Versículos -->
      <div id="nivel-versiculos" style="display:none">
        <div class="bible-nav-header">
          <button class="bible-back-btn" onclick="voltarCapitulos()">‹ Capítulos</button>
          <span id="capAtualTitulo"></span>
          <span></span>
        </div>
        <div class="bible-cap-nota" id="verseCapNotaArea">
          <div class="bible-cap-nota-toggle" onclick="toggleNotaCapituloVerses()">
            📓 Nota do capítulo <span id="verseCapNotaIcon">▼</span>
          </div>
          <div id="verseCapNotaForm" style="display:none">
            <textarea id="verseCapNotaTexto" rows="3" placeholder="Anotação geral deste capítulo…"></textarea>
            <button class="btn btn--primary" style="margin-top:8px;width:100%" onclick="salvarNotaCapituloVerses()">Salvar nota</button>
          </div>
        </div>
        <div id="versiculosList"></div>
      </div>
    </section>

  </main>
</div>

<!-- MODAIS -->
<div class="modal-overlay" id="modal-escala">
  <div class="modal">
    <div class="modal-header">
      <h2>Nova Escala</h2>
      <button class="modal-close" onclick="fecharModal('modal-escala')">✕</button>
    </div>
    <div class="modal-body">
      <label>Data<input type="date" id="esc-data"/></label>
      <label>Operador<select id="esc-operador"><option value="">Selecionar servo…</option></select></label>
      <label>Músicas<textarea id="esc-musicas" rows="2" placeholder="Lista de músicas…"></textarea></label>
      <label>Observação<textarea id="esc-obs" rows="2" placeholder="Algo importante a lembrar…"></textarea></label>
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" onclick="fecharModal('modal-escala')">Cancelar</button>
      <button class="btn btn--primary" onclick="salvarEscala()">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-servo">
  <div class="modal">
    <div class="modal-header">
      <h2>Novo Servo</h2>
      <button class="modal-close" onclick="fecharModal('modal-servo')">✕</button>
    </div>
    <div class="modal-body">
      <label>Nome<input type="text" id="srv-nome" placeholder="Nome completo"/></label>
      <label>Telefone<input type="tel" id="srv-telefone" placeholder="(51) 9 0000-0000"/></label>
      <label>Função<input type="text" id="srv-funcao" placeholder="Ex: Operador, Músico…"/></label>
      <label>E-mail<input type="email" id="srv-email" placeholder="email@exemplo.com"/></label>
      <label>Aniversário<input type="date" id="srv-aniversario"/></label>
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" onclick="fecharModal('modal-servo')">Cancelar</button>
      <button class="btn btn--primary" onclick="salvarServo()">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-anotacao-verso">
  <div class="modal">
    <div class="modal-header">
      <h2>Anotação do Versículo</h2>
      <button class="modal-close" onclick="fecharModal('modal-anotacao-verso')">✕</button>
    </div>
    <div class="modal-body">
      <div class="bible-verse-preview" id="anotacaoVersoPreview"></div>
      <label>Anotação<textarea id="anotacaoVersoTexto" rows="5" placeholder="Escreve a tua anotação…"></textarea></label>
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" onclick="fecharModal('modal-anotacao-verso')">Cancelar</button>
      <button class="btn btn--primary" onclick="salvarAnotacaoVerso()">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-favorito">
  <div class="modal">
    <div class="modal-header">
      <h2>Adicionar aos Favoritos</h2>
      <button class="modal-close" onclick="fecharModal('modal-favorito')">✕</button>
    </div>
    <div class="modal-body">
      <div class="bible-verse-preview" id="favoritoPreview"></div>
      <label>Categoria
        <select id="favoritoCategoria">
          <option value="geral">Geral</option>
          <option value="pregacao">Pregação</option>
          <option value="estudo">Estudo</option>
          <option value="devocional">Devocional</option>
          <option value="promessa">Promessa</option>
        </select>
      </label>
      <label>Anotação<textarea id="favoritoAnotacao" rows="3" placeholder="Opcional…"></textarea></label>
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" onclick="fecharModal('modal-favorito')">Cancelar</button>
      <button class="btn btn--primary" onclick="confirmarFavorito()">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-estudo">
  <div class="modal modal--wide">
    <div class="modal-header">
      <h2 id="modalEstudoTitulo">Novo Estudo</h2>
      <button class="modal-close" onclick="fecharModal('modal-estudo')">✕</button>
    </div>
    <div class="modal-body">
      <label>Título<input type="text" id="est-titulo" placeholder="Título do estudo ou pregação"/></label>
      <label>Versículo base<input type="text" id="est-versiculo" placeholder="Ex: João 3:16"/></label>
      <label>Texto base<textarea id="est-texto-base" rows="2" placeholder="Cole o versículo aqui…"></textarea></label>
      <label>Categoria
        <select id="est-categoria">
          <option value="geral">Geral</option>
          <option value="pregacao">Pregação</option>
          <option value="estudo">Estudo Bíblico</option>
          <option value="devocional">Devocional</option>
          <option value="celula">Célula</option>
        </select>
      </label>
      <label>Conteúdo / Anotações<textarea id="est-conteudo" rows="8" placeholder="Pontos principais, observações…"></textarea></label>
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" onclick="fecharModal('modal-estudo')">Cancelar</button>
      <button class="btn btn--primary" onclick="salvarEstudo()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav" id="bottomNav" style="display:none">
  <button class="bottom-nav-item active" data-tab="dashboard">⚡<span>Home</span></button>
  <button class="bottom-nav-item" data-tab="calendario">📅<span>Agenda</span></button>
  <button class="bottom-nav-item" data-tab="escalas">🎛️<span>Escalas</span></button>
  <button class="bottom-nav-item" data-tab="biblia">📖<span>Bíblia</span></button>
  <button class="bottom-nav-item" data-tab="servos">👥<span>Servos</span></button>
</nav>

<script src="app.js"></script>
</body>
</html>
